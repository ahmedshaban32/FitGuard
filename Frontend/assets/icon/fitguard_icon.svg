<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#16082a"/>
      <stop offset="100%" style="stop-color:#0d0520"/>
    </linearGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="120%">
      <stop offset="0%" style="stop-color:#9b5de5"/>
      <stop offset="40%" style="stop-color:#7b2fd4"/>
      <stop offset="100%" style="stop-color:#5a0fb8"/>
    </linearGradient>

    <!-- Shield inner glow -->
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
    </linearGradient>

    <!-- Lightning gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#e9d5ff"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <!-- Glow filter for shield -->
    <filter id="shieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for bolt -->
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow -->
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bgGrad)"/>

  <!-- Subtle background radial glow -->
  <radialGradient id="centerGlow" cx="50%" cy="48%" r="45%">
    <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
    <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#centerGlow)" clip-path="url(#roundedClip)"/>

  <!-- Decorative background rings (subtle) -->
  <circle cx="512" cy="500" r="340" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="512" cy="500" r="420" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.07"/>

  <!-- Shield outer glow blob -->
  <ellipse cx="512" cy="505" rx="220" ry="240" fill="#7c3aed" opacity="0.18" filter="url(#outerGlow)"/>

  <!-- === SHIELD SHAPE === -->
  <!-- Shield base (outer edge / border highlight) -->
  <path d="M512 155
           L730 245
           L730 490
           Q730 660 512 780
           Q294 660 294 490
           L294 245
           Z"
        fill="none"
        stroke="#c084fc"
        stroke-width="5"
        stroke-opacity="0.5"
        filter="url(#shieldGlow)"/>

  <!-- Shield main fill -->
  <path d="M512 168
           L718 252
           L718 488
           Q718 648 512 762
           Q306 648 306 488
           L306 252
           Z"
        fill="url(#shieldGrad)"
        filter="url(#shieldGlow)"/>

  <!-- Shield inner highlight (top-left sheen) -->
  <path d="M512 168
           L718 252
           L718 488
           Q718 648 512 762
           Q306 648 306 488
           L306 252
           Z"
        fill="url(#shieldInner)"/>

  <!-- Shield inner border line -->
  <path d="M512 198
           L692 274
           L692 486
           Q692 630 512 734
           Q332 630 332 486
           L332 274
           Z"
        fill="none"
        stroke="#e9d5ff"
        stroke-width="2.5"
        stroke-opacity="0.25"/>

  <!-- === LIGHTNING BOLT === -->
  <!-- Bolt glow layer (blurred behind) -->
  <path d="M556 270
           L452 510
           L524 510
           L468 754
           L622 464
           L542 464
           L610 270
           Z"
        fill="#e9d5ff"
        opacity="0.35"
        filter="url(#boltGlow)"/>

  <!-- Bolt main shape -->
  <path d="M556 270
           L452 510
           L524 510
           L468 754
           L622 464
           L542 464
           L610 270
           Z"
        fill="url(#boltGrad)"
        filter="url(#boltGlow)"/>

  <!-- Bolt inner bright core -->
  <path d="M548 305
           L465 508
           L520 508
           L476 710
           L600 472
           L536 472
           L596 305
           Z"
        fill="white"
        opacity="0.55"/>

  <!-- Tiny sparkle dots around bolt -->
  <circle cx="430" cy="350" r="5" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="600" cy="290" r="4" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="650" cy="440" r="3.5" fill="#c084fc" opacity="0.8"/>
  <circle cx="380" cy="560" r="4" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="630" cy="620" r="3" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="410" cy="680" r="4.5" fill="#c084fc" opacity="0.55"/>

  <!-- Bottom subtle shine on shield -->
  <ellipse cx="512" cy="740" rx="120" ry="18" fill="#c084fc" opacity="0.15"/>
</svg>
